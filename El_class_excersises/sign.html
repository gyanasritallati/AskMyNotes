<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account</title>
  <style>
    /* ---------- Basic reset ---------- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Trebuchet MS', 'Segoe UI', sans-serif;
    }

    /* ---------- Color variables (easy to change later) ---------- */
    :root {
      --black: #000000;
      --white: #ffffff;
      --cloud: #95BDD7;
    }

    body {
      min-height: 100vh;
      background-color: #B4E1EB;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      padding: 20px;
    }

    /* ---------- Small clouds clustered near the top ---------- */
    .cloud {
      position: absolute;
      background: var(--cloud);
      border-radius: 50%;
      opacity: 0.9;
      z-index: 0;
      animation: drift 18s ease-in-out infinite;
    }

    @keyframes drift {
      0% {
        transform: translateX(0);
      }

      50% {
        transform: translateX(40px);
      }

      100% {
        transform: translateX(0);
      }
    }

    .cloud1 {
      animation-duration: 16s;
    }

    .cloud2 {
      animation-duration: 22s;
      animation-delay: -3s;
    }

    .cloud3 {
      animation-duration: 19s;
      animation-delay: -7s;
    }

    .cloud4 {
      animation-duration: 25s;
      animation-delay: -10s;
    }

    .cloud5 {
      animation-duration: 20s;
      animation-delay: -5s;
    }

    .cloud::before,
    .cloud::after {
      content: "";
      position: absolute;
      background: var(--cloud);
      border-radius: 50%;
    }

    .cloud1 {
      width: 50px;
      height: 20px;
      top: 6%;
      left: 8%;
    }

    .cloud1::before {
      width: 28px;
      height: 28px;
      top: -12px;
      left: 6px;
    }

    .cloud1::after {
      width: 20px;
      height: 20px;
      top: -7px;
      left: 26px;
    }

    .cloud2 {
      width: 34px;
      height: 14px;
      top: 10%;
      left: 22%;
    }

    .cloud2::before {
      width: 18px;
      height: 18px;
      top: -8px;
      left: 4px;
    }

    .cloud2::after {
      width: 14px;
      height: 14px;
      top: -5px;
      left: 18px;
    }

    .cloud3 {
      width: 60px;
      height: 24px;
      top: 4%;
      left: 68%;
    }

    .cloud3::before {
      width: 32px;
      height: 32px;
      top: -14px;
      left: 8px;
    }

    .cloud3::after {
      width: 24px;
      height: 24px;
      top: -8px;
      left: 32px;
    }

    .cloud4 {
      width: 30px;
      height: 12px;
      top: 12%;
      left: 85%;
    }

    .cloud4::before {
      width: 16px;
      height: 16px;
      top: -7px;
      left: 3px;
    }

    .cloud4::after {
      width: 12px;
      height: 12px;
      top: -4px;
      left: 15px;
    }

    .cloud5 {
      width: 40px;
      height: 16px;
      top: 8%;
      left: 45%;
    }

    .cloud5::before {
      width: 22px;
      height: 22px;
      top: -10px;
      left: 5px;
    }

    .cloud5::after {
      width: 16px;
      height: 16px;
      top: -6px;
      left: 20px;
    }

    /* ---------- The signup card ---------- */
    .signup-card {
      position: relative;
      z-index: 1;
      background-color: var(--white);
      color: var(--black);
      width: 100%;
      max-width: 400px;
      padding: 40px 32px;
      border-radius: 16px;
      border: 4px solid var(--black);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
    }

    h1 {
      text-align: center;
      color: var(--black);
      font-size: 28px;
      margin-bottom: 24px;
      letter-spacing: 1px;
    }

    .field {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-size: 14px;
      margin-bottom: 6px;
      color: var(--black);
      font-weight: bold;
    }

    input {
      width: 100%;
      padding: 12px 14px;
      border-radius: 8px;
      border: 2px solid var(--black);
      outline: none;
      font-size: 15px;
      background-color: var(--white);
      color: var(--black);
    }

    input:focus {
      box-shadow: 0 0 0 3px rgba(30, 95, 168, 0.3);
    }

    #error-msg {
      color: var(--black);
      background-color: #eaf2fb;
      border: 1px solid var(--black);
      padding: 8px;
      border-radius: 6px;
      font-size: 13px;
      text-align: center;
      margin-bottom: 14px;
      display: none;
    }

    .signup-btn {
      width: 100%;
      padding: 14px;
      background-color: var(--black);
      color: var(--white);
      font-size: 16px;
      font-weight: bold;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 8px;
      transition: transform 0.15s ease, background-color 0.15s ease;
    }

    .signup-btn:hover {
      background-color: var(--black);
      transform: translateY(-2px);
    }

    .login-text {
      text-align: center;
      margin-top: 20px;
      font-size: 14px;
      color: var(--black);
    }

    .login-text a {
      color: var(--black);
      font-weight: bold;
      text-decoration: none;
    }

    .login-text a:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>

  <div class="cloud cloud1"></div>
  <div class="cloud cloud2"></div>
  <div class="cloud cloud3"></div>
  <div class="cloud cloud4"></div>
  <div class="cloud cloud5"></div>

  <div class="signup-card">
    <h1>Create Account</h1>

    <div id="error-msg">Passwords do not match. Please try again.</div>

    <form id="signup-form">
      <div class="field">
        <label for="fullname">Full Name</label>
        <input type="text" id="fullname" placeholder="Enter your full name" required>
      </div>

      <div class="field">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="Enter your email" required>
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Create a password" required>
      </div>

      <div class="field">
        <label for="confirm-password">Confirm Password</label>
        <input type="password" id="confirm-password" placeholder="Re-enter your password" required>
      </div>

      <button type="submit" class="signup-btn">Sign Up</button>
    </form>

    <p class="login-text">
      Already have an account? <a href="#">Log in</a>
    </p>
  </div>

  <script>
    const form = document.getElementById('signup-form');
    const password = document.getElementById('password');
    const confirmPassword = document.getElementById('confirm-password');
    const errorMsg = document.getElementById('error-msg');

    form.addEventListener('submit', function (e) {
      e.preventDefault();

      if (password.value !== confirmPassword.value) {
        errorMsg.style.display = 'block';
        return;
      }

      errorMsg.style.display = 'none';

      alert('Account created successfully for ' + document.getElementById('fullname').value + '!');
      form.reset();
    });
  </script>

</body>

</html>
