```html
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Food Delivery Signup</title>

    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }


        body {

            height: 100vh;

            display: flex;

            justify-content: center;

            align-items: center;

            background: linear-gradient(135deg, #ff9800, #ffd54f);

        }


        .signup-box {

            background-color: white;

            width: 350px;

            padding: 30px;

            border-radius: 15px;

            text-align: center;

            box-shadow: 0px 10px 25px rgba(0,0,0,0.2);

        }


        h1 {

            color: #e65100;

            margin-bottom: 10px;

        }


        p {

            color: gray;

            margin-bottom: 20px;

        }


        input {

            width: 100%;

            padding: 12px;

            margin: 8px 0;

            border: 1px solid #ccc;

            border-radius: 8px;

            font-size: 15px;

        }


        button {

            width: 100%;

            padding: 12px;

            margin-top: 15px;

            background-color: #e65100;

            color: white;

            border: none;

            border-radius: 8px;

            font-size: 18px;

            cursor: pointer;

        }


        button:hover {

            background-color: #bf360c;

        }


        a {

            color: #e65100;

            text-decoration: none;

        }


        #message {

            margin-top: 15px;

            font-weight: bold;

        }


    </style>

</head>


<body>


    <div class="signup-box">


        <h1>🍕 Food Delivery App</h1>

        <p>Create your account</p>


        <form id="signupForm">


            <input 
            type="text" 
            id="name" 
            placeholder="Full Name">


            <input 
            type="text" 
            id="phone" 
            placeholder="Phone Number">


            <input 
            type="email" 
            id="email" 
            placeholder="Email Address">


            <input 
            type="password" 
            id="password" 
            placeholder="Create Password">


            <input 
            type="password" 
            id="confirmPassword" 
            placeholder="Confirm Password">


            <button type="submit">
                Sign Up
            </button>


            <p id="message"></p>


            <p>
                Already have an account?
                <a href="#">
                    Login
                </a>
            </p>


        </form>


    </div>



<script>


let form = document.getElementById("signupForm");


form.addEventListener("submit", function(event){


    event.preventDefault();


    let name = document.getElementById("name").value;

    let phone = document.getElementById("phone").value;

    let email = document.getElementById("email").value;

    let password = document.getElementById("password").value;

    let confirmPassword = document.getElementById("confirmPassword").value;


    let message = document.getElementById("message");



    if(name==="" || phone==="" || email==="" || password==="" || confirmPassword===""){

        message.style.color="red";

        message.innerHTML="Please fill all details";

        return;

    }



    if(phone.length !== 10 || isNaN(phone)){

        message.style.color="red";

        message.innerHTML="Enter a valid 10 digit phone number";

        return;

    }



    if(password.length < 8){

        message.style.color="red";

        message.innerHTML="Password should have minimum 8 characters";

        return;

    }



    if(password !== confirmPassword){

        message.style.color="red";

        message.innerHTML="Passwords do not match";

        return;

    }



    message.style.color="green";

    message.innerHTML="Registration Successful 🎉 Welcome!";


    form.reset();


});


</script>


</body>

</html>
